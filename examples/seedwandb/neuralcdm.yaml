program: example_neuralcdm.py
method: bayes
metric:
  goal: maximize
  name: valid_metric

parameters:
  model_name:
    values: ["neuralcdm"]
  dataset:
    values: ["xes"]

  hidden_dims1:
    values: [128, 256, 512]
  hidden_dims2:
    values: [64, 128, 256]

  dropout1:
    values: [0.0, 0.05, 0.1, 0.2, 0.3]
  dropout2:
    values: [0.0, 0.05, 0.1, 0.2, 0.3]

  lr:
    values: [5e-3, 3e-3, 1e-3, 5e-4, 3e-4, 1e-4, 5e-5, 1e-5]

  batch_size:
    values: [32, 64, 128, 256]

  fold:
    values: [0, 1, 2, 3, 4]
  seed:
    values: [42, 3407]
