#orcdf.yaml
program: example_orcdf.py
method: bayes
metric:
  goal: maximize
  name: valid_metric
parameters:
  model_name:
    values: ["orcdf"]
  dataset:
    values: ["xes"]
  latent_dim:
    values: [ 32, 64]
  gcn_layers:
    values: [2, 3, 4, 5]
  hidden_dims1:
    values: [512, 256]
  hidden_dims2:
    values: [256, 128]
  flip_ratio:
    values: [0.05, 0.1, 0.15, 0.2]
  ssl_temp:
    values: [0.3, 0.5, 0.7]
  ssl_weight:
    values: [1e-4, 1e-3, 1e-2]
  lr:
    values: [1e-4, 3e-4, 4e-3]
  batch_size:
    values: [512, 1024]
  seed:
    values: [42, 3407]
  fold:
    values: [0, 1, 2, 3, 4]