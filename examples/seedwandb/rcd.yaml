# kancd.yaml
program: example_rcd.py
method: bayes
metric:
  goal: maximize
  name: valid_metric
parameters:
  model_name:
    values: ["rcd"]
  dataset:
    values: ["xes"]
  emb_dim:
    values: [10, 15, 20, 30]
  lr:
    values: [1e-3, 5e-4, 1e-4, 5e-5]
  batch_size:
    values: [32, 64, 128, 256]
  fold:
    values: [0, 1, 2, 3, 4]
  seed:
    values: [42, 3407]