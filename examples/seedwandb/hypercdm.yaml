# hypercdm.yaml
program: example_hypercdm.py
method: bayes
metric:
  goal: maximize
  name: valid_metric
parameters:
  model_name:
    values: ["hypercdm"]
  dataset:
    values: ["xes"]
  feature_dim:
    values: [128, 256, 512]
  emb_dim:
    values: [8, 16, 32]
  layers:
    values: [2, 3, 4, 5]
  lr:
    values: [1e-3, 5e-4, 1e-4, 5e-5]
  batch_size:
    values: [32, 64, 128]
  seed:
    values: [42, 3407]
  fold:
    values: [0, 1, 2, 3, 4]
