# irt.yaml
program: example_irt.py
method: bayes
metric:
  goal: maximize
  name: valid_metric
parameters:
  model_name:
    values: ["irt"]
  dataset:
    values: ["xes"]
  value_range:
    values: [5.0, 10.0, 15.0, 20.0]
  a_range:
    values: [1.0, 2.0, 3.0, 5.0]
  lr:
    values: [1e-3, 5e-4, 1e-4, 5e-5]
  batch_size:
    values: [32, 64, 128]
  fold:
    values: [0, 1, 2, 3, 4]
  seed:
    values: [42, 3407]