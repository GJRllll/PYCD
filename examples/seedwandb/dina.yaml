# dina.yaml
program: example_dina.py
method: bayes
metric:
  goal: maximize
  name: valid_metric
parameters:
  model_name:
    values: ["dina"]
  dataset:
    values: ["xes"]
  hidden_dim:
    values: [20, 30, 40, 50]
  ste:
    values: [0, 1]
  max_slip:
    values: [0.2, 0.3, 0.4, 0.5]
  max_guess:
    values: [0.2, 0.3, 0.4, 0.5]
  lr:
    values: [1e-3, 5e-4, 1e-4, 5e-5]
  batch_size:
    values: [64, 128, 256]
  fold:
    values: [0, 1, 2, 3, 4]
  seed:
    values: [42, 3407]