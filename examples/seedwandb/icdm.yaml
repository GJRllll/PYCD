# dina.yaml
program: example_icdm.py
method: bayes
metric:
  goal: maximize
  name: valid_metric
parameters:
  model_name:
    values: ["icdm"]
  dataset:
    values: ["xes"]
  gcnlayers:
    values: [2, 3, 4]
  dim:
    values: [16, 32]
  dataset:
    values: ["mean", "gcn", "pool", "lstm"]
  khop:
    values: [3, 4, 5]
  weight_reg:
    values: [0.01, 0.001, 0.0001]
  lr:
    values: [1e-3, 5e-4, 1e-4, 5e-5]
  batch_size:
    values: [32, 64, 128, 256]
  fold:
    values: [0, 1, 2, 3, 4]
  seed:
    values: [42, 3407]